name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check (informational)
        continue-on-error: true
        run: cargo fmt --manifest-path helper/Cargo.toml --check
      - name: Clippy
        run: cargo clippy --manifest-path helper/Cargo.toml --release -- -D warnings
      - name: Build
        run: cargo build --manifest-path helper/Cargo.toml --release
